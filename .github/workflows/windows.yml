name: windows
on:
  # push:
  #  branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    # runs-on: windows-latest
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: bash
    steps:
      - run: |
          pip install conan
          conan profile detect
          echo '
          [conf]
          tools.microsoft.bash:path=C:\msys64\usr\bin\bash.exe
          tools.microsoft.bash:subsystem=msys2' >> $(conan profile path default)

          #cd C:\msys64\usr\bin
          C:\msys64\usr\bin\bash.exe -l -c "pacman -S base-devel gcc --noconfirm"

      - run: |
          #cd C:\msys64\usr\bin
          C:\msys64\usr\bin\bash.exe -l -c "pacman -S base-devel gcc --noconfirm"
        shell: cmd

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: kambala-decapitator/conan-center-index
          ref: package/libvpx
          path: cci
          sparse-checkout: recipes/libvpx

      - run: |
          conan create cci/recipes/libvpx/all --version 1.16.0 -b missing
          
