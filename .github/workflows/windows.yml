name: windows
on:
  # push:
  #  branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    # runs-on: windows-latest
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: bash
    steps:
      - run: |
          pip install conan
          conan profile detect
          echo '
          [conf]
          #tools.microsoft.bash:path=C:\msys64\usr\bin\bash.exe
          tools.microsoft.bash:path=C:\Program Files\Git\bin\bash.exe
          tools.microsoft.bash:subsystem=msys2
          
          [platform_tool_requires]
          cmake/3.31.6
          ninja/1.13.2
          strawberryperl/5.32.1

          [replace_tool_requires]
          cmake/*: cmake/3.31.6
          ninja/*: ninja/1.13.2
          strawberryperl/*: strawberryperl/5.32.1' >> $(conan profile path default)

      - run: |
          rem C:\msys64\usr\bin\bash.exe -l -c "pacman -S base-devel gcc --noconfirm"
        shell: cmd

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: kambala-decapitator/conan-center-index
          ref: package/libvpx
          path: cci
          sparse-checkout: recipes/libvpx

      - run: |
          conan create cci/recipes/libvpx/all --version 1.16.0 -b missing
          # conan install --require nasm/2.16.01 -b 'nasm/*'

